<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AR Portales</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #000;
        overflow: hidden;
        width: 100dvw;
        height: 100dvh;
        font-family: system-ui, sans-serif;
      }

      #ar-container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      /* MindAR injects its own canvas/video inside #ar-container */
      #ar-container canvas {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
      }

      /* Overlay shown before AR starts */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: rgba(0, 0, 0, 0.85);
        z-index: 100;
      }

      #overlay h1 {
        color: #fff;
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        padding: 0 2rem;
      }

      #overlay p {
        color: rgba(255,255,255,0.6);
        font-size: 0.95rem;
        text-align: center;
        max-width: 280px;
        line-height: 1.5;
      }

      #start-btn {
        padding: 0.9rem 2.5rem;
        border: none;
        border-radius: 999px;
        background: #fff;
        color: #000;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s, opacity 0.15s;
      }
      #start-btn:active { transform: scale(0.96); opacity: 0.8; }

      #stop-btn {
        display: none;
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.7rem 2rem;
        border: 2px solid rgba(255,255,255,0.6);
        border-radius: 999px;
        background: rgba(0,0,0,0.4);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        z-index: 50;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>

    <div id="overlay">
      <h1>AR Portales</h1>
      <p>Apuntá la cámara a una imagen escondida para abrir un portal.</p>
      <button id="start-btn">Iniciar AR</button>
    </div>

    <button id="stop-btn">Detener AR</button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
